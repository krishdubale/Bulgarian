name: linguaflow_app
description: A multi-language learning platform with adaptive SRS, premium UI, and audio support.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3
  shared_preferences: ^2.2.2
  flutter_tts: ^3.8.5
  audioplayers: ^5.2.1
  percent_indicator: ^4.2.3
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/data/
    - assets/data/languages/bg/
    - assets/data/languages/ro/
    - assets/data/languages/ka/
    - assets/data/languages/sv/
