name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter-quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: Smoke test (boot)
        run: flutter test test/widget_test.dart
